services:
  backend:
    build: ./backend
    container_name: effective-backend
    networks:
      - app-network

  nginx:
    image: nginx:1.25-alpine
    container_name: effective-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge